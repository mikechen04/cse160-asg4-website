<?xml version="1.0" encoding="UTF-8"?>
<!-- 256x256, power of 2, square. simple brick-ish wall texture -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <rect x="0" y="0" width="256" height="256" fill="#b96b4f"/>

  <!-- mortar lines -->
  <g stroke="#8a4a35" stroke-width="4" opacity="0.9">
    <!-- horizontal lines -->
    <line x1="0" y1="32" x2="256" y2="32"/>
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="96" x2="256" y2="96"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="0" y1="224" x2="256" y2="224"/>

    <!-- vertical lines (offset every other row) -->
    <!-- row 0 -->
    <line x1="64" y1="0" x2="64" y2="32"/>
    <line x1="128" y1="0" x2="128" y2="32"/>
    <line x1="192" y1="0" x2="192" y2="32"/>
    <!-- row 1 (offset) -->
    <line x1="32" y1="32" x2="32" y2="64"/>
    <line x1="96" y1="32" x2="96" y2="64"/>
    <line x1="160" y1="32" x2="160" y2="64"/>
    <line x1="224" y1="32" x2="224" y2="64"/>
    <!-- row 2 -->
    <line x1="64" y1="64" x2="64" y2="96"/>
    <line x1="128" y1="64" x2="128" y2="96"/>
    <line x1="192" y1="64" x2="192" y2="96"/>
    <!-- row 3 (offset) -->
    <line x1="32" y1="96" x2="32" y2="128"/>
    <line x1="96" y1="96" x2="96" y2="128"/>
    <line x1="160" y1="96" x2="160" y2="128"/>
    <line x1="224" y1="96" x2="224" y2="128"/>
    <!-- row 4 -->
    <line x1="64" y1="128" x2="64" y2="160"/>
    <line x1="128" y1="128" x2="128" y2="160"/>
    <line x1="192" y1="128" x2="192" y2="160"/>
    <!-- row 5 (offset) -->
    <line x1="32" y1="160" x2="32" y2="192"/>
    <line x1="96" y1="160" x2="96" y2="192"/>
    <line x1="160" y1="160" x2="160" y2="192"/>
    <line x1="224" y1="160" x2="224" y2="192"/>
    <!-- row 6 -->
    <line x1="64" y1="192" x2="64" y2="224"/>
    <line x1="128" y1="192" x2="128" y2="224"/>
    <line x1="192" y1="192" x2="192" y2="224"/>
    <!-- row 7 (offset) -->
    <line x1="32" y1="224" x2="32" y2="256"/>
    <line x1="96" y1="224" x2="96" y2="256"/>
    <line x1="160" y1="224" x2="160" y2="256"/>
    <line x1="224" y1="224" x2="224" y2="256"/>
  </g>

  <!-- some random darker bricks -->
  <g fill="rgba(0,0,0,0.12)">
    <rect x="8" y="8" width="44" height="16"/>
    <rect x="136" y="40" width="48" height="18"/>
    <rect x="70" y="72" width="50" height="18"/>
    <rect x="180" y="136" width="50" height="18"/>
    <rect x="20" y="200" width="52" height="18"/>
  </g>
</svg>

